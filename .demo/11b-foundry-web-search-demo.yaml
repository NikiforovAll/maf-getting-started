title: 11b Foundry Web Search Demo
description: Walk through HostedWebSearchTool — real-time web queries with annotated citations.
version: 3
demos:
  - title: Intro
    description: Introduce the Web Search hosted tool.
    steps:
      - action: openSlide
        path: .demo/slides/11b-foundry-web-search-start.md
  - title: Create Agent
    description: HostedWebSearchTool one-liner gives the agent web access.
    steps:
      - action: open
        path: src/11b-foundry-web-search.cs
      - action: highlight
        path: src/11b-foundry-web-search.cs
        position: '27:32'
        zoom: 2
  - title: Run
    description: Ask a real-time question the model can't answer from training data.
    steps:
      - action: highlight
        path: src/11b-foundry-web-search.cs
        position: '36:36'
        zoom: 2
  - title: Citation Extraction
    description: LINQ pipeline extracts UriCitationMessageAnnotation from response.
    steps:
      - action: highlight
        path: src/11b-foundry-web-search.cs
        position: '46:51'
        zoom: 2
  - title: Display Citations
    description: Render citations as a Spectre table with title and URL.
    steps:
      - action: highlight
        path: src/11b-foundry-web-search.cs
        position: '55:72'
        zoom: 2
  - title: Wrap Up
    description: Recap web search before moving to RAG.
    steps:
      - action: openSlide
        path: .demo/slides/11b-foundry-web-search-end.md
