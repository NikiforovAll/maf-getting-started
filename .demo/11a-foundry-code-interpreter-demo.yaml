title: 11a Foundry Code Interpreter Demo
description: Walk through HostedCodeInterpreterTool — Python sandbox execution on the server.
version: 3
demos:
  - title: Intro
    description: Introduce the Code Interpreter hosted tool.
    steps:
      - action: openSlide
        path: .demo/slides/11a-foundry-code-interpreter-start.md
  - title: Create Agent
    description: One-liner HostedCodeInterpreterTool gives the agent a Python sandbox.
    steps:
      - action: open
        path: src/11a-foundry-code-interpreter.cs
      - action: highlight
        path: src/11a-foundry-code-interpreter.cs
        position: '32:52'
        zoom: 1
  - title: Run
    description: Ask the agent to solve a math problem with Python.
    steps:
      - action: highlight
        path: src/11a-foundry-code-interpreter.cs
        position: '56:58'
        zoom: 1
  - title: Response Parsing
    description: Walk the response contents to see the full execution flow.
    steps:
      - action: highlight
        path: src/11a-foundry-code-interpreter.cs
        position: '61:63'
        zoom: 1
  - title: TextContent
    description: Text before and after the tool call — thinking vs final answer.
    steps:
      - action: highlight
        path: src/11a-foundry-code-interpreter.cs
        position: '66:74'
        zoom: 1
  - title: Code Tool Call
    description: CodeInterpreterToolCallContent contains the Python code the agent wrote.
    steps:
      - action: highlight
        path: src/11a-foundry-code-interpreter.cs
        position: '77:89'
        zoom: 1
  - title: Code Tool Result
    description: CodeInterpreterToolResultContent returns the execution output.
    steps:
      - action: highlight
        path: src/11a-foundry-code-interpreter.cs
        position: '92:105'
        zoom: 1
  - title: Wrap Up
    description: Recap Code Interpreter before moving to web search.
    steps:
      - action: openSlide
        path: .demo/slides/11a-foundry-code-interpreter-end.md
