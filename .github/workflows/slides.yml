name: Build & Deploy Slides

on:
  push:
    branches: [main]
    paths: ["slides/**"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build slides
        run: |
          set -euo pipefail
          OUT="dist"
          mkdir -p "$OUT/img"

          cp slides/img/* "$OUT/img/"

          for md in slides/*.md; do
            name=$(basename "$md" .md)
            npx @marp-team/marp-cli "$md" \
              --theme-set slides/themes/theme.css slides/themes/base.css \
              --html \
              --allow-local-files \
              -o "$OUT/${name}.html"
          done

          cat > "$OUT/index.html" <<'INDEXEOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
          <meta charset="utf-8">
          <meta name="viewport" content="width=device-width, initial-scale=1">
          <title>MAF Presentations</title>
          <style>
          body { font-family: 'Inter', 'Segoe UI', sans-serif; max-width: 720px; margin: 60px auto; padding: 0 20px; color: #1a1a2e; }
          h1 { color: #1f6feb; }
          a { color: #1f6feb; text-decoration: none; }
          a:hover { text-decoration: underline; }
          ul { list-style: none; padding: 0; }
          li { padding: 12px 0; border-bottom: 1px solid #d0d7de; font-size: 1.1em; }
          </style>
          </head>
          <body>
          <h1>Microsoft Agent Framework &mdash; Presentations</h1>
          <ul>
          INDEXEOF

          for html in "$OUT"/*.html; do
            fname=$(basename "$html")
            [ "$fname" = "index.html" ] && continue
            title=$(echo "$fname" | sed 's/\.html$//' | sed 's/-/ /g')
            echo "<li><a href=\"$fname\">$title</a></li>" >> "$OUT/index.html"
          done

          cat >> "$OUT/index.html" <<'INDEXEOF'
          </ul>
          </body>
          </html>
          INDEXEOF

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
